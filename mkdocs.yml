site_name: The DSA Woodshed
site_url: https://dsa-woodshed.space/
site_description: Company-neutral DSA and technical interview study packet
repo_url: https://github.com/Jesssullivan/dsa-study-packet
repo_name: Jesssullivan/dsa-study-packet

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

# Plugin order matters. `meta` runs first so per-directory `.meta.yml`
# front matter (search boosts) is applied before `tags`/`social` read it.
# `social` needs the Cairo/Pillow imaging stack (the nix devshell provides it);
# builds without those libs skip it cleanly. mkdocs is a local reading/dev
# surface only — it is not built or deployed in CI; the public reading surface
# is https://dsa-woodshed.space (a separate SvelteKit site).
# `privacy` self-hosts external assets and is listed last so it can rewrite the
# fully assembled output.
plugins:
  - meta
  - search
  - section-index
  - gen-files:
      scripts:
        - scripts/gen_algo_pages.py
        - scripts/gen_progress_page.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2
  # Allowed tags = the topic directories under src/algo. The generated
  # algorithm pages (scripts/gen_algo_pages.py) emit `tags: [<topic>]`; the
  # tags plugin rejects any tag not in this list, so the two must agree.
  - tags:
      tags_allowed:
        - arrays
        - backtracking
        - bit_manipulation
        - dp
        - graphs
        - greedy
        - heaps
        - linked_lists
        - patterns
        - recursion
        - searching
        - sliding_window
        - sorting
        - stacks_queues
        - strings
        - trees
        - two_pointers
  - social:
      enabled: !ENV [CI, false]
  - privacy

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/css/visualizer.css

extra_javascript:
  - assets/js/visualizer.js

# Pre-launch de-indexing is handled by docs/robots.txt (MkDocs copies it to
# the site root). An `extra.meta` robots block here is dead config — no
# template or plugin consumes it — so none is kept. Remove docs/robots.txt
# at public launch.
