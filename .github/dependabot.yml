# Dependency update lanes. Actions bumps are the ones that bite (runtime and
# artifact-behavior changes — see the reading surface's upload-pages-artifact
# dotfile lesson); pip is uv-locked, so bumps here are advisory PRs to review,
# never auto-merged.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-minor-and-patch:
        update-types: ['minor', 'patch']
