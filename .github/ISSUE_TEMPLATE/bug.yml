name: Bug report
description: Something in the packet, drills, or tooling is broken.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Include the command you ran, if any (e.g. `just test`, `just lint`).
    validations:
      required: true
  - type: textarea
    id: what-expected
    attributes:
      label: What you expected instead
    validations:
      required: true
