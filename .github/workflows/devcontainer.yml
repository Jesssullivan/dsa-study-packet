name: devcontainer-smoke

# Proves a stranger's Codespace works: the container builds on Linux with NO
# secrets, and the editor-first practice loop runs green end-to-end. The final
# challenge-done calls keep the legacy compatibility path idempotent.

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "justfile"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/strip_solution.py"
      - "scripts/core42.py"
      - "scripts/practice_workspace.py"
      - "scripts/rep_schema.py"
      - "scripts/scaffold_status.py"
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".vscode/**"
      - ".github/workflows/devcontainer.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "justfile"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/strip_solution.py"
      - "scripts/core42.py"
      - "scripts/practice_workspace.py"
      - "scripts/rep_schema.py"
      - "scripts/scaffold_status.py"
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".vscode/**"
      - ".github/workflows/devcontainer.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build devcontainer and run the practice loop
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          push: never
          runCmd: |
            set -euxo pipefail
            bash --noprofile --norc -c 'command -v uv; command -v just; command -v watchexec'
            uv --version
            just --version
            bash .devcontainer/welcome.sh
            uv run pytest tests/arrays -q
            PRACTICE_NO_OPEN=1 just practice-start comments arrays two_sum
            just practice-status
            just practice-next | tee /tmp/practice-think.txt
            grep -q '^STATE: THINK$' /tmp/practice-think.txt
            if just practice-test; then
              echo "locked workspace unexpectedly ran tests" >&2
              exit 1
            fi
            sed -i \
              -e 's|# Write what this function should return and any assumptions in your own words.|# TODO later|' \
              -e 's|# Work one ordinary example and one edge case by hand.|# [2, 7], 9 returns (0, 1); negatives remain valid.|' \
              -e 's|# Note the simplest correct plan and what must stay true while it runs.|# Seen maps each prior value to its index.|' \
              .challenges/workspace/two_sum.py
            just practice-next | tee /tmp/practice-placeholder.txt
            grep -q '^STATE: THINK$' /tmp/practice-placeholder.txt
            grep -Fqx 'NEXT: Add 1 more ordinary reasoning comment above the gate, save, then run /continue.' /tmp/practice-placeholder.txt
            sed -i \
              -e 's|# TODO later|# Return two distinct indices whose values sum to the target.|' \
              -e '/# Narrate the next code choice before implementing it./d' \
              -e '/# Trace one example and note which tests prove the important edges./d' \
              -e '/# Record the final time and space costs plus anything still uncertain./d' \
              -e '/# ==== THINKING GATE:/d' \
              -e 's|    raise NotImplementedError|    seen: dict[int, int] = {}\n    for index, value in enumerate(nums):\n        complement = target - value\n        if complement in seen:\n            return (seen[complement], index)\n        seen[value] = index\n    raise ValueError("no two elements sum to target")|' \
              .challenges/workspace/two_sum.py
            sed -i \
              -e 's|# from algo.arrays.two_sum import two_sum|from algo.arrays.two_sum import two_sum|' \
              -e '/# def test_concrete_example()/,+1 s|^# ||' \
              -e '/def test_concrete_example()/,+1 s|assert ...|assert two_sum([2, 7, 11, 15], 9) == (0, 1)|' \
              .challenges/workspace/test_two_sum_candidate.py
            just practice-status
            just practice-next | tee /tmp/practice-build.txt
            grep -q '^STATE: BUILD$' /tmp/practice-build.txt
            sed -i \
              -e 's|    seen: dict\[int, int\] = {}|    seen: dict[int, int] = {}\n    # Each value enters the lookup after its complement check.|' \
              .challenges/workspace/two_sum.py
            just practice-next | tee /tmp/practice-reflect-trace.txt
            grep -q '^STATE: REFLECT$' /tmp/practice-reflect-trace.txt
            sed -i \
              -e 's|        if complement in seen:|        # For [2, 7] and 9, value 7 finds complement 2 at index 0.\n        if complement in seen:|' \
              .challenges/workspace/two_sum.py
            just practice-next | tee /tmp/practice-reflect-complexity.txt
            grep -q '^STATE: REFLECT$' /tmp/practice-reflect-complexity.txt
            sed -i \
              -e 's|    raise ValueError("no two elements sum to target")|    # The lookup grows to n entries, so time and space are O(n).\n    raise ValueError("no two elements sum to target")|' \
              .challenges/workspace/two_sum.py
            just practice-next | tee /tmp/practice-next.txt
            grep -q '^STATE: CLOSE$' /tmp/practice-next.txt
            just practice-test
            just practice-finish "smoke: trace one edge before tests"
            just practice-finish "smoke: trace one edge before tests"
            just challenge-done arrays two_sum
            just challenge-done arrays two_sum
            just study-spaced 3
            just public-boundary
