name: devcontainer-smoke

# Proves the Linux container, command/state loop, and focused-test receipts work
# with no secrets. This is not fresh-Codespace, Copilot sign-in, or real VS Code
# tab acceptance. PRACTICE_NO_OPEN suppresses the GUI; a fake code CLI below
# checks only the exact candidate-tab invocation contract.

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - "justfile"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/strip_solution.py"
      - "scripts/core42.py"
      - "scripts/python_candidate_target.py"
      - "scripts/practice_workspace.py"
      - "scripts/rep_schema.py"
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".vscode/**"
      - ".github/workflows/devcontainer.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "justfile"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/strip_solution.py"
      - "scripts/core42.py"
      - "scripts/python_candidate_target.py"
      - "scripts/practice_workspace.py"
      - "scripts/rep_schema.py"
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".vscode/**"
      - ".github/workflows/devcontainer.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build devcontainer and run command/state smoke
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          push: never
          runCmd: |
            set -euxo pipefail
            bash --noprofile --norc -c 'command -v uv; command -v just; command -v watchexec'
            uv --version
            just --version
            bash .devcontainer/welcome.sh
            uv run pytest tests/arrays -q
            PRACTICE_NO_OPEN=1 just practice-start comments arrays two_sum
            fake_code_bin="$(mktemp -d)"
            cat >"$fake_code_bin/code" <<'FAKE_CODE'
            #!/usr/bin/env bash
            printf '%s\n' "$@" > /tmp/practice-code-args.txt
            FAKE_CODE
            chmod +x "$fake_code_bin/code"
            PATH="$fake_code_bin:$PATH" just practice-open | tee /tmp/practice-open.txt
            test "$(wc -l < /tmp/practice-code-args.txt | tr -d ' ')" = "4"
            test "$(sed -n '1p' /tmp/practice-code-args.txt)" = "--reuse-window"
            test "$(sed -n '2p' /tmp/practice-code-args.txt)" = ".challenges/workspace/test_two_sum_candidate.py"
            test "$(sed -n '3p' /tmp/practice-code-args.txt)" = "--goto"
            goto_target="$(sed -n '4p' /tmp/practice-code-args.txt)"
            printf '%s\n' "$goto_target" |
              grep -Eq '^\.challenges/workspace/two_sum\.py:[1-9][0-9]*$'
            grep -Fqx "OPENED: $goto_target" /tmp/practice-open.txt
            grep -Fqx "SOURCE: .challenges/workspace/two_sum.py" /tmp/practice-open.txt
            grep -Fqx "TEST: .challenges/workspace/test_two_sum_candidate.py" /tmp/practice-open.txt
            just practice-status
            just practice-next | tee /tmp/practice-think.txt
            grep -q '^STATE: THINK$' /tmp/practice-think.txt
            if just practice-test; then
              echo "stub implementation unexpectedly passed tests" >&2
              exit 1
            fi
            sed -i \
              -e 's|# Keep your reasoning beside the code in ordinary comments or a docstring; revise it as code and tests change your mind.|# Return two distinct indices. For [2, 7] and 9, the answer is (0, 1).\n    # Keep prior values by index so each complement lookup is constant time.|' \
              -e 's|    raise NotImplementedError|    seen: dict[int, int] = {}\n    for index, value in enumerate(nums):\n        complement = target - value\n        if complement in seen:\n            return (seen[complement], index)\n        seen[value] = index\n    raise ValueError("no two elements sum to target")|' \
              .challenges/workspace/two_sum.py
            sed -i \
              -e 's|# from algo.arrays.two_sum import two_sum|from algo.arrays.two_sum import two_sum|' \
              -e '/# def test_concrete_example()/,+1 s|^# ||' \
              -e '/def test_concrete_example()/,+1 s|assert ...|assert two_sum([2, 7, 11, 15], 9) == (0, 1)|' \
              .challenges/workspace/test_two_sum_candidate.py
            just practice-status
            just practice-next | tee /tmp/practice-reflect.txt
            grep -q '^STATE: REFLECT$' /tmp/practice-reflect.txt
            just practice-test
            just practice-next | tee /tmp/practice-close.txt
            grep -q '^STATE: CLOSE$' /tmp/practice-close.txt
            sed -i \
              -e 's|    seen: dict\[int, int\] = {}|    seen: dict[int, int] = {}\n    # Add a value only after checking it, so one element cannot match itself.|' \
              .challenges/workspace/two_sum.py
            just practice-next | tee /tmp/practice-stale.txt
            grep -q '^STATE: REFLECT$' /tmp/practice-stale.txt
            just practice-test
            just practice-next | tee /tmp/practice-next.txt
            grep -q '^STATE: CLOSE$' /tmp/practice-next.txt
            just practice-finish "smoke: trace one edge before tests"
            just practice-finish "smoke: trace one edge before tests"
            just challenge-done arrays two_sum
            just challenge-done arrays two_sum
            just study-spaced 3
            just public-boundary
