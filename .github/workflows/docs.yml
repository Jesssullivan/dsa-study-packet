name: docs
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Actions Pages deployment (replaces the legacy gh-pages/Jekyll build that
# was erroring on pre-built mkdocs HTML). configure-pages with enablement flips
# the Pages source to "GitHub Actions" automatically.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install uv
      - run: uv sync --extra docs
      - name: Public boundary guard
        run: uv run python scripts/check_public_boundary.py
      - name: Build printable booklet
        run: |
          uv run python scripts/gen_booklet.py
          tectonic booklet.tex
          mkdir -p docs/assets
          cp booklet.pdf docs/assets/booklet.pdf
      - name: Build site (strict)
        run: uv run --extra docs python -m mkdocs build --strict
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
