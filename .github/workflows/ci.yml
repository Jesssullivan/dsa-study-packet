name: ci

# The main CI gate. Repo is private (Actions minutes are metered), so this is
# deliberately a single lean job rather than a matrix.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Base runner images ship a preinstalled system Python that may not satisfy
  # requires-python (>=3.14); force uv to always fetch its own managed
  # CPython instead of probing the system one. Mirrors containerEnv in
  # .devcontainer/devcontainer.json so CI and Codespaces resolve the same way.
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  gate:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # Pinned by commit with the release tag as a comment, per upstream's
      # own README guidance (the @v<major> tag is not maintained past v7;
      # newer releases are only tagged by exact version/SHA).
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.27" # matches UV_VERSION in .devcontainer/setup.sh

      # taiki-e/install-action is the actively-maintained multi-tool installer
      # (extractions/setup-just has had no recent releases). Exact version
      # pin per its own security guidance; tool pin matches JUST_VERSION in
      # .devcontainer/setup.sh.
      - name: Install just
        uses: taiki-e/install-action@v2.82.11
        with:
          tool: just@1.40.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff + mypy + public-boundary + doc-counts + no-stubs + appendix schema)
        run: just lint

      # Scoped empirically: plain `uv run pytest -q` collects and runs the
      # whole tests/ tree cleanly, including tests/concepts — those modules
      # use pytest.importorskip for their optional deps (numpy ships
      # unconditionally via the scipy-stubs base dependency; scipy/flask/
      # pydantic are genuinely optional and just skip 3 tests). No --extra
      # concepts sync or --ignore is needed to keep the job green.
      - name: Test
        run: uv run pytest -q
