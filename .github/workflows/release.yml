name: release

# Cuts a GitHub Release from a CalVer tag (vYYYY.M.PATCH, see CONTRIBUTING.md)
# with the printable booklet and reference-sheet PDFs attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  release:
    name: build + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # Pinned by commit with the release tag as a comment, matching ci.yml.
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.27" # matches UV_VERSION in .devcontainer/setup.sh

      - name: Install just
        uses: taiki-e/install-action@v2.82.11
        with:
          tool: just@1.40.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build printable booklet
        run: |
          uv run python scripts/gen_booklet.py
          tectonic booklet.tex

      - name: Build reference-sheet PDFs
        run: just pdf-all

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" booklet.pdf reference-sheets/pdf/*.pdf --generate-notes
